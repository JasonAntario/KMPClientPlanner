<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Android — Новый клиент (Репетитор)</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared_styles.css">
</head><body>
<div class="page-title">Android · 08 · Новый клиент — Репетитор</div>
<div class="phone">
  <div class="sbar"><span class="stime">9:41</span><span class="sicons">●●●</span></div>
  <div class="tbar"><button class="ibtn">✕</button><h1>Новый клиент</h1><button class="btn-text">Сохранить</button></div>
  <div class="content">
    <div class="scroll">
      <div class="tf-wrap"><div class="tf-lbl">Имя *</div><input class="tf" value="Иван" readonly /></div>
      <div class="tf-wrap"><div class="tf-lbl">Фамилия (опционально)</div><input class="tf" value="Козлов" readonly /></div>
      <div class="tf-wrap"><div class="tf-lbl">Номер телефона (опционально)</div><input class="tf" placeholder="Не указан" readonly style="color:#79747E;" /></div>
      <div class="sec-lbl">Уровень знаний (опционально)</div>
      <div class="slct"><span style="font-size:15px;color:#1C1B1F;">Начинающий</span><span style="font-size:18px;color:#49454F;">▾</span></div>
      <div class="sec-lbl">Формат занятий</div>
      <div class="chip-row" style="padding:0;margin-bottom:14px;">
        <div class="chip on">Онлайн</div>
        <div class="chip">Оффлайн</div>
        <div class="chip">Оба</div>
      </div>
      <div class="sec-lbl">Расписание (опционально)</div>
      <div style="background:#F3EDF7;border-radius:12px;padding:12px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;color:#1C1B1F;">Ср · 10:00–11:30</span>
          <button style="background:none;border:none;color:#B3261E;font-size:13px;">Удалить</button>
        </div>
        <button style="background:#E8DEF8;border:none;border-radius:100px;height:32px;padding:0 14px;font-size:13px;color:#21005D;font-weight:500;">+ Добавить слот</button>
      </div>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Комментарий (опционально)</div>
      <textarea class="tf-outline" rows="2" placeholder="Готовится к ЕГЭ..." style="resize:none;"></textarea>
      <div style="display:flex;justify-content:flex-end;"><button class="btn-filled">Сохранить</button></div>
    </div>
  </div>
</div>
</body></html>

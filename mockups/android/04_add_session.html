<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Android — Добавление занятия</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared_styles.css">
</head><body>
<div class="page-title">Android · 04 · Добавление занятия</div>
<div class="phone">
  <div class="sbar"><span class="stime">9:41</span><span class="sicons">●●●</span></div>
  <div class="tbar">
    <button class="ibtn">✕</button>
    <h1>Новое занятие</h1>
    <button class="btn-text">Сохранить</button>
  </div>
  <div class="content">
    <div class="scroll">
      <div class="tf-wrap"><div class="tf-lbl">Тема занятия *</div><input class="tf" value="Алгебра" readonly /></div>
      <div style="font-size:12px;color:#49454F;margin-bottom:8px;">Клиент *</div>
      <div class="m3-card" style="padding:8px 12px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
        <div class="avatar-sm">АП</div>
        <span style="font-size:14px;color:#1C1B1F;flex:1;">Анна Петрова</span>
        <button style="background:none;border:none;color:#6750A4;font-size:20px;cursor:pointer;">+</button>
      </div>
      <div class="tf-wrap"><div class="tf-lbl">Цена (опционально)</div><input class="tf" value="50 BYN" readonly /></div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <div style="flex:1;"><div style="font-size:12px;color:#49454F;margin-bottom:4px;">Начало</div><div style="background:#FEFBFF;border:1px solid #6750A4;border-radius:4px;padding:6px 10px;font-size:14px;color:#1C1B1F;">04.06 10:00</div></div>
        <div style="flex:1;"><div style="font-size:12px;color:#49454F;margin-bottom:4px;">Конец</div><div class="tf-outline" style="font-size:14px;padding:6px 10px;margin-bottom:0;">04.06 11:30</div></div>
      </div>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Статус занятия</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <div class="chip selected">Запланировано</div>
        <div class="chip">Проведено</div>
      </div>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Статус оплаты</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <div class="chip selected">Не оплачено</div>
        <div class="chip">Оплачено</div>
      </div>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Домашнее задание (опционально)</div>
      <textarea class="tf-outline" rows="2" placeholder="Параграф 13, задачи 1–3..." style="resize:none;"></textarea>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Комментарий (опционально)</div>
      <textarea class="tf-outline" rows="2" placeholder="Заметки к занятию..." style="resize:none;"></textarea>
    </div>
  </div>
</div>
</body></html>

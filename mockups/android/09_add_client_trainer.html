<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Android — Новый клиент (Тренер)</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared_styles.css">
</head><body>
<div class="page-title">Android · 09 · Новый клиент — Тренер</div>
<div class="phone">
  <div class="sbar"><span class="stime">9:41</span><span class="sicons">●●●</span></div>
  <div class="tbar"><button class="ibtn">✕</button><h1>Новый клиент</h1><button class="btn-text">Сохранить</button></div>
  <div class="content">
    <div class="scroll">
      <div class="tf-wrap"><div class="tf-lbl">Имя *</div><input class="tf" value="Мария" readonly /></div>
      <div class="tf-wrap"><div class="tf-lbl">Фамилия (опционально)</div><input class="tf" value="Сидорова" readonly /></div>
      <div class="tf-wrap"><div class="tf-lbl">Номер телефона (опционально)</div><input class="tf" value="+375 33 456-78-90" readonly /></div>
      <div class="tf-wrap"><div class="tf-lbl">Вес клиента, кг (опционально)</div><input class="tf" value="68" readonly /></div>
      <div class="sec-lbl">Формат тренировок</div>
      <div class="chip-row" style="padding:0;margin-bottom:14px;">
        <div class="chip">Онлайн</div>
        <div class="chip on">Оффлайн</div>
        <div class="chip">Оба</div>
      </div>
      <div class="sec-lbl">Расписание (опционально)</div>
      <div style="background:#F3EDF7;border-radius:12px;padding:12px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><span style="font-size:13px;color:#1C1B1F;">Пн · 09:00–10:00</span><button style="background:none;border:none;color:#B3261E;font-size:13px;">Удалить</button></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><span style="font-size:13px;color:#1C1B1F;">Чт · 09:00–10:00</span><button style="background:none;border:none;color:#B3261E;font-size:13px;">Удалить</button></div>
        <button style="background:#E8DEF8;border:none;border-radius:100px;height:32px;padding:0 14px;font-size:13px;color:#21005D;font-weight:500;">+ Добавить слот</button>
      </div>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Комментарий (опционально)</div>
      <textarea class="tf-outline" rows="2" placeholder="Заметки о клиенте..." style="resize:none;"></textarea>
      <div style="display:flex;justify-content:flex-end;"><button class="btn-filled">Сохранить</button></div>
    </div>
  </div>
</div>
</body></html>

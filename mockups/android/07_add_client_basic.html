<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Android — Новый клиент (базовый)</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared_styles.css">
</head><body>
<div class="page-title">Android · 07 · Новый клиент — базовый / бьюти-мастер</div>
<div class="phone">
  <div class="sbar"><span class="stime">9:41</span><span class="sicons">●●●</span></div>
  <div class="tbar">
    <button class="ibtn">✕</button>
    <h1>Новый клиент</h1>
    <button class="btn-text">Сохранить</button>
  </div>
  <div class="content">
    <div class="scroll">
      <div class="tf-wrap"><div class="tf-lbl">Имя *</div><input class="tf" value="Анна" readonly /></div>

      <div class="tf-wrap"><div class="tf-lbl">Адрес (опционально)</div><input class="tf" placeholder="Не указан" readonly style="color:#79747E;" /></div>
      <div style="font-size:12px;color:#49454F;margin-bottom:4px;">Комментарий (опционально)</div>
      <textarea class="tf-outline" rows="3" placeholder="Заметки о клиенте..." style="resize:none;"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:4px;"><button class="btn-filled">Сохранить</button></div>
    </div>
  </div>
</div>
